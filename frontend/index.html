<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestor de Tareas — Listas Simples</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/frontend/css/styles.css"/>
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="header-badge">Listas Simples</span>
      <h1>Gestor de <span class="accent">Tareas</span></h1>
      <p class="header-sub">Lista enlazada — cada nodo apunta a la siguiente tarea</p>
    </div>
  </header>

  <div class="container">

    <div class="form-card">
      <h2>Agregar nueva tarea</h2>
      <div class="form-grid">

        <div class="full">
          <label for="inp-label">Nombre de la tarea</label>
          <input type="text" id="inp-label" placeholder="Ej: Estudiar para el parcial"/>
        </div>

        <div class="full">
          <label>Prioridad</label>
          <select id="inp-urgency" aria-label="Prioridad" style="display:none">
            <option value="alta">Alta</option>
            <option value="media" selected>Media</option>
            <option value="baja">Baja</option>
          </select>
          <div class="priority-selector" role="group" aria-label="Seleccionar prioridad">
            <button type="button" class="priority-btn" data-value="alta" aria-pressed="false">
              <svg class="priority-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M14 3C14 3 9 8.5 9 13.5C9 16.5 10.5 18.5 12 19.5C11.5 17.5 13 15.5 13 15.5C13 15.5 13.5 19 16 20.5C17.5 19.5 19 17.5 19 14.5C19 11 16 7 14 3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <circle cx="14" cy="21.5" r="2" stroke="currentColor" stroke-width="1.6"/>
              </svg>
              <span class="priority-label">Alta</span>
            </button>
            <button type="button" class="priority-btn active" data-value="media" aria-pressed="true">
              <svg class="priority-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="14" cy="14" r="9" stroke="currentColor" stroke-width="1.6"/>
                <path d="M14 9V14L17 16.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span class="priority-label">Media</span>
            </button>
            <button type="button" class="priority-btn" data-value="baja" aria-pressed="false">
              <svg class="priority-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M7 21C7 21 8 13 14 10C20 7 22 8 22 8C22 8 21 14 16 17C13 19 10 19.5 7 21Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M7 21L12 16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
              <span class="priority-label">Baja</span>
            </button>
          </div>
        </div>

        <div class="full">
          <label for="inp-summary">Descripción (opcional)</label>
          <textarea id="inp-summary" rows="2" placeholder="Detalles adicionales sobre la tarea..."></textarea>
        </div>

        <div class="full btn-wrap">
          <button class="btn-add" id="btn-submit">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M7 1V13M1 7H13" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Agregar tarea
          </button>
        </div>

      </div>
    </div>

    <div class="stats-bar">
      <div class="stat-pill">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <rect x="1" y="1" width="12" height="12" rx="3" stroke="currentColor" stroke-width="1.4"/>
          <path d="M4 7H10M4 4.5H10M4 9.5H7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span class="num" id="stat-total">0</span> total
      </div>
      <div class="stat-pill stat-done-pill">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.4"/>
          <path d="M4 7L6.5 9.5L10 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="num" id="stat-done">0</span> hechas
      </div>
      <div class="stat-pill stat-pend-pill">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.4"/>
          <path d="M7 4V7.5L9 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span class="num" id="stat-pend">0</span> pendientes
      </div>
    </div>

    <p class="section-title">Lista de tareas pendientes</p>
    <div id="task-list"></div>

  </div>

  <div id="toast" role="status" aria-live="polite"></div>
  <script src="/frontend/js/app.js"></script>
</body>
</html>
